<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocupações SP | Monitor</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        h1 { color: #FFD700; text-transform: uppercase; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #FFD700; color: #000; padding: 10px; text-align: left; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .caracteristica { color: #FFD700; font-weight: bold; }
        .alerta { color: #FF0000; font-weight: bold; }
        @media screen and (max-width: 600px) {
            thead { display: none; }
            tr { display: block; border: 1px solid #333; margin-bottom: 15px; background: #111; padding: 10px; }
            td { display: block; text-align: right; padding: 5px 0; border-bottom: 1px solid #222; }
            td::before { content: attr(data-label); float: left; color: #FFD700; font-weight: bold; }
        }
    </style>
</head>
<body>
    <h1>🏁 OCUPAÇÕES SP</h1>
    <table id="tabela-vagas">
        <thead>
            <tr>
                <th>Fonte</th>
                <th>Característica</th>
                <th>Salário</th>
                <th>Qualificação</th>
                <th>CEP</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        async function carregarVagas() {
            try {
                const r = await fetch('vagas_rastreadas.csv');
                const texto = await r.text();
                const linhas = texto.split('\n').slice(1);
                const corpo = document.querySelector('tbody');
                
                linhas.forEach(linha => {
                    const col = linha.split(',');
                    if(col.length > 5) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td data-label="Fonte">${col[1]}</td>
                            <td data-label="Característica" class="caracteristica">${col[2]}</td>
                            <td data-label="Salário">R$ ${col[3]}</td>
                            <td data-label="Qualificação" class="alerta">🚩 ${col[4]}</td>
                            <td data-label="CEP">${col[6]}</td>
                        `;
                        corpo.appendChild(tr);
                    }
                });
            } catch (e) { console.error("Erro ao ler CSV"); }
        }
        carregarVagas();
    </script>
</body>
</html>
